    <text x="1275" y="119" font-size="16" fill="#6b7280">▱ 0</text>
    <rect x="1316" y="101" width="26" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="1322" y="121" font-size="22" fill="#374151">+</text>
    <rect x="1344" y="101" width="26" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="1349" y="121" font-size="19" fill="#374151">⚙</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="1390" y="87" width="122" height="593" rx="6" fill="#e8e8ed"/>
    <text x="1406" y="120" font-size="24" fill="#1f2937">⌄</text>
    <text x="1426" y="120" font-size="17" font-weight="700" fill="#1f2937">Closed</text>
    <rect x="1396" y="148" width="115" height="115" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="1410" y="178" font-size="16" font-weight="700" fill="#4b4b55">Faute de</text>
    <rect x="1410" y="190" width="58" height="24" rx="12" fill="#00a84f"/>
    <text x="1421" y="208" font-size="14" font-weight="700" fill="#ffffff">Valide</text>
    <text x="1412" y="239" font-size="15" fill="#6b7280">▯ #17</text>
  </g>
