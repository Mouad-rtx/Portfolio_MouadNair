<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1478 682" role="img" aria-labelledby="title desc">
  <title id="title">Tableau Kanban GitLab</title>
  <desc id="desc">Capture stylisee d'un tableau GitLab avec les colonnes A valider, Valide et Invalide.</desc>
  <rect width="1478" height="682" fill="#f2f2f7"/>
  <rect x="0" y="0" width="1478" height="70" fill="#ffffff"/>
  <rect x="10" y="14" width="148" height="37" rx="8" fill="#ffffff" stroke="#c9cbd1"/>
  <text x="24" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#3f3f46">Development</text>
  <rect x="167" y="14" width="1163" height="37" rx="8" fill="#ffffff" stroke="#aeb4bd"/>
  <text x="182" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#6b7280">Search</text>
  <circle cx="1312" cy="33" r="9" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="1319" y1="40" x2="1326" y2="47" stroke="#374151" stroke-width="2"/>
  <line x1="0" y1="69" x2="1478" y2="69" stroke="#d1d5db"/>

  <g font-family="Segoe UI, Arial, sans-serif">
