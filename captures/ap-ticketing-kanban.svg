    <text x="353" y="119" font-size="16" fill="#6b7280">▱ 0</text>
    <rect x="397" y="101" width="24" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="403" y="121" font-size="22" fill="#374151">+</text>
    <rect x="424" y="101" width="26" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="429" y="121" font-size="19" fill="#374151">⚙</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="464" y="87" width="458" height="593" rx="6" fill="#e8e8ed"/>
    <line x1="464" y1="89" x2="922" y2="89" stroke="#00b050" stroke-width="4"/>
    <text x="481" y="118" font-size="25" fill="#1f2937">⌄</text>
    <rect x="505" y="103" width="58" height="24" rx="12" fill="#00a84f"/>
    <text x="516" y="121" font-size="14" font-weight="700" fill="#ffffff">Valide</text>
    <text x="811" y="119" font-size="16" fill="#6b7280">▱ 18</text>
    <rect x="856" y="101" width="26" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="862" y="121" font-size="22" fill="#374151">+</text>
    <rect x="884" y="101" width="26" height="26" rx="5" fill="#ffffff" stroke="#b5bac3"/>
    <text x="889" y="121" font-size="19" fill="#374151">⚙</text>
    <rect x="473" y="148" width="416" height="78" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="487" y="177" font-size="17" font-weight="700" fill="#4b4b55">Erreurs lors de la creation de salles</text>
    <text x="490" y="204" font-size="16" fill="#6b7280">▯ #1</text>
    <rect x="473" y="237" width="416" height="78" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="487" y="266" font-size="17" font-weight="700" fill="#4b4b55">Adaptation de la base de donnees</text>
    <text x="490" y="293" font-size="16" fill="#6b7280">▯ #34</text>
    <rect x="473" y="326" width="416" height="78" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="487" y="355" font-size="17" font-weight="700" fill="#4b4b55">Erreurs lors de la creation/edition de ligues</text>
    <text x="490" y="382" font-size="16" fill="#6b7280">▯ #2</text>
    <rect x="473" y="415" width="416" height="78" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="487" y="444" font-size="17" font-weight="700" fill="#4b4b55">Nouveau besoin d'informations</text>
    <text x="490" y="471" font-size="16" fill="#6b7280">▯ #32  ◇ v.1.1</text>
    <rect x="473" y="504" width="416" height="105" rx="8" fill="#ffffff" stroke="#d7d9df"/>
    <text x="487" y="535" font-size="17" font-weight="700" fill="#4b4b55">Erreurs lors de la creation/edition de</text>
    <text x="487" y="556" font-size="17" font-weight="700" fill="#4b4b55">reservants</text>
    <text x="490" y="586" font-size="16" fill="#6b7280">▯ #3</text>
    <circle cx="852" cy="581" r="14" fill="#dc143c"/>
    <rect x="903" y="167" width="12" height="253" rx="6" fill="#8b8d95"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="924" y="87" width="458" height="593" rx="6" fill="#e8e8ed"/>
    <line x1="924" y1="89" x2="1382" y2="89" stroke="#065f46" stroke-width="4"/>
    <text x="941" y="118" font-size="25" fill="#1f2937">⌄</text>
    <rect x="965" y="103" width="65" height="24" rx="12" fill="#064e3b"/>
