<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <rect width="1280" height="620" fill="#f7f8fa"/>
  <rect width="1280" height="76" fill="#1f2b3a"/>
  <text x="96" y="48" font-family="Arial" font-size="28" font-weight="700" fill="#18b8a8">Portfolio</text>
  <rect x="96" y="120" width="360" height="300" rx="8" fill="#fff" stroke="#d9e2ec"/>
  <rect x="96" y="120" width="5" height="300" fill="#18b8a8"/>
  <text x="126" y="200" font-family="Arial" font-size="36" font-weight="800" fill="#122033">Impacts observés</text>
  <text x="132" y="255" font-family="Arial" font-size="18" fill="#415066">• Arrêt ou ralentissement de l'activité.</text>
  <text x="132" y="295" font-family="Arial" font-size="18" fill="#415066">• Vol de données personnelles.</text>
  <text x="132" y="335" font-family="Arial" font-size="18" fill="#415066">• Perte de confiance des clients.</text>
  <text x="132" y="375" font-family="Arial" font-size="18" fill="#415066">• Coûts de remédiation.</text>
  <rect x="96" y="450" width="1030" height="120" rx="8" fill="#fff" stroke="#d9e2ec"/>
  <rect x="96" y="450" width="5" height="120" fill="#18b8a8"/>
  <text x="126" y="496" font-family="Arial" font-size="18" fill="#415066">Cette veille me permet de suivre les attaques récentes, de comprendre les techniques utilisées</text>
  <text x="126" y="530" font-family="Arial" font-size="18" fill="#415066">par les cybercriminels et d'identifier les bonnes pratiques de sécurité utiles au développement.</text>
</svg>
