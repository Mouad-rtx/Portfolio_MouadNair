<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1308 768" role="img" aria-labelledby="title desc">
  <title id="title">Detail d'un ticket GitLab</title>
  <desc id="desc">Capture stylisee du detail d'un ticket GitLab avec activite et commentaire.</desc>
  <rect width="1308" height="768" fill="#f3f2fb"/>
  <rect x="66" y="56" width="1120" height="680" rx="14" fill="#fff"/>
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">Groupe 9 / equipe 9 / Elements de travail /</text>
  <text x="476" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">#34</text>
  <line x1="66" y1="114" x2="1308" y2="114" stroke="#d1d5db"/>
  <rect x="80" y="128" width="70" height="24" rx="12" fill="#e5e7eb"/>
  <text x="90" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">Importe</text>
  <text x="170" y="147" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#20212b">Adaptation de la base de donnees</text>
  <rect x="72" y="171" width="1112" height="52" rx="10" fill="#f8fafc" stroke="#e5e7eb" stroke-width="6"/>
  <text x="82" y="203" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4b5563">Aucun element enfant n'est actuellement assigne. Utilisez les elements enfants pour decomposer le travail en parties plus petites.</text>
  <rect x="66" y="235" width="1120" height="100" rx="12" fill="#e8e8ed"/>
  <text x="82" y="267" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#20212b">Elements lies</text>
  <text x="205" y="267" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#6b7280">0</text>
  <rect x="72" y="286" width="1112" height="48" rx="8" fill="#fff"/>
  <text x="82" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4b5563">Reliez les elements entre eux pour montrer qu'ils sont lies.</text>
  <text x="66" y="386" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#000">Activite</text>
  <rect x="806" y="360" width="150" height="30" rx="8" fill="#fff" stroke="#aeb4bd"/>
  <text x="818" y="381" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#20212b">Toute activite</text>
  <rect x="970" y="360" width="286" height="30" rx="8" fill="#fff" stroke="#aeb4bd"/>
  <text x="982" y="381" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#20212b">Du plus ancien au plus recent</text>
  <line x1="86" y1="435" x2="86" y2="520" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="86" cy="435" r="4" fill="#6b7280"/>
  <circle cx="86" cy="490" r="4" fill="#6b7280"/>
  <text x="116" y="442" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f3f46">Elias Perez</text>
  <text x="216" y="442" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">affecte a @mouadnair3 3 decembre 2024</text>
  <text x="116" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f3f46">Mouad Nair</text>
  <text x="226" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">a ajoute</text>
  <rect x="286" y="480" width="60" height="26" rx="13" fill="#00a84f"/>
  <text x="292" y="499" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Valide</text>
  <text x="350" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">etiquette 10 dec. 2024</text>
  <circle cx="86" cy="560" r="20" fill="#2f3368"/>
  <rect x="116" y="536" width="1070" height="140" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="136" y="567" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f3f46">Mouad Nair</text>
  <text x="250" y="567" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">@mouadnair3  16 dec. 2024</text>
  <rect x="914" y="548" width="90" height="26" rx="13" fill="#e5e7eb"/>
  <text x="924" y="567" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">Promoteur</text>
  <text x="136" y="601" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#3f3f46">Pour eviter les erreurs de saisie des fonctions des reservants, on propose de creer une table separee pour les fonctions,</text>
  <text x="136" y="628" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#3f3f46">que l'on liera a la table des reservants avec ID_Fonction qui va etre la cle primaire de la table Fonction et la cle etrangere de</text>
  <text x="136" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#3f3f46">la table reservants. Cela permettra de mieux organiser et fiabiliser les informations.</text>
  <rect x="1234" y="165" width="340" height="560" fill="#fff"/>
  <text x="1306" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#20212b">Cessionnaire</text>
  <text x="1306" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#4b5563">Mouad Nair</text>
  <line x1="1306" y1="282" x2="1644" y2="282" stroke="#e5e7eb"/>
  <text x="1306" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#20212b">Etiquettes</text>
  <rect x="1306" y="330" width="78" height="26" rx="13" fill="#00a84f"/>
  <text x="1315" y="349" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Valide x</text>
</svg>
