  <text x="193" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#89919d">v2.6.0</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="25" y="83" width="356" height="244" rx="8" fill="#ffffff" stroke="#dddddd"/>
