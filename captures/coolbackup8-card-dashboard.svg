    <text x="1262" y="215" font-size="18" fill="#2271b1">2026 23h15</text>
    <text x="1362" y="215" font-size="15" font-weight="700" fill="#555">(6 jours)</text>
    <rect x="1262" y="226" width="94" height="25" rx="12" fill="#dc3545"/>
    <text x="1276" y="244" font-size="13" font-weight="700" fill="#ffffff">▦ Mensuel</text>
    <text x="1361" y="243" font-size="18" fill="#2271b1">1 mars 2026</text>
    <text x="1262" y="272" font-size="18" fill="#2271b1">23h30</text>
    <text x="1328" y="272" font-size="15" font-weight="700" fill="#555">(3 semaines)</text>
    <text x="1262" y="300" font-size="15" fill="#555">Prochaines sauvegardes</text>
  </g>
  <rect x="25" y="351" width="1496" height="138" rx="8" fill="#ffffff" stroke="#dddddd"/>
  <text x="48" y="393" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#111820">Actions rapides</text>
  <rect x="48" y="414" width="353" height="53" rx="4" fill="#2271b1"/>
