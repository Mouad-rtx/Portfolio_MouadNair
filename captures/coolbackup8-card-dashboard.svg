<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1546 627" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard CoolBackup8</title>
  <desc id="desc">Capture stylisée du tableau de bord CoolBackup8 avec statistiques, actions rapides et paramétrages par défaut.</desc>
  <rect width="1546" height="627" fill="#eeeeef"/>
