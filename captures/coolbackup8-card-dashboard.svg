    <text x="1368" y="130" font-size="18" font-weight="700" fill="#2271b1">11 février 2026</text>
    <text x="1262" y="160" font-size="18" fill="#2271b1">23h08</text>
    <text x="1326" y="160" font-size="15" font-weight="700" fill="#555">(24 heures)</text>
    <rect x="1262" y="171" width="106" height="25" rx="12" fill="#18a63c"/>
    <text x="1277" y="188" font-size="13" font-weight="700" fill="#ffffff">▦ Hebdomadaire</text>
