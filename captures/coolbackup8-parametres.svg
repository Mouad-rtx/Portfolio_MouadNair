<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1643 630" role="img"><rect width="1643" height="630" fill="#fff"/><text x="23" y="47" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Paramétrages par défaut disponibles</text><line x1="23" y1="62" x2="1619" y2="62" stroke="#2271b1" stroke-width="2"/><text x="23" y="103" font-family="Segoe UI,Arial" font-size="16">Cliquez sur un paramétrage pour l'appliquer immédiatement:</text><g font-family="Segoe UI,Arial"><rect x="23" y="135" width="514" height="443" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/><text x="50" y="182" font-size="23" font-weight="700" fill="#0a5fb4">Standard (Recommandé)</text><text x="50" y="225" font-size="16" fill="#4b5563">Configuration optimale pour la plupart des sites</text><rect x="50" y="244" width="461" height="221" rx="4" fill="#fafafa"/><text x="70" y="288" font-size="16">Quotidien: 23:00 (7)</text><text x="70" y="334" font-size="16">Hebdomadaire: 23:15 (4)</text><text x="70" y="380" font-size="16">Mensuel: 23:30 (6)</text><text x="70" y="426" font-size="16">Annuel: 23:45 (3)</text><rect x="50" y="489" width="461" height="39" rx="3" fill="#2271b1"/><text x="188" y="515" font-size="16" fill="#fff">Appliquer ce paramétrage</text><rect x="564" y="135" width="514" height="443" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/><text x="590" y="182" font-size="23" font-weight="700" fill="#0a5fb4">Légère (Faible espace)</text><text x="590" y="225" font-size="16" fill="#4b5563">Minimise l'espace utilisé</text><rect x="1104" y="135" width="514" height="443" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/><text x="1130" y="182" font-size="23" font-weight="700" fill="#0a5fb4">Complète (Haute redondance)</text><text x="1130" y="225" font-size="16" fill="#4b5563">Conserve beaucoup de sauvegardes</text></g></svg>
