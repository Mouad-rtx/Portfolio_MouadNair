    <text x="718" y="233">Accueil</text><text x="886" y="233">Services</text><text x="1068" y="233">Locaux</text><text x="1248" y="233">Ligues</text><text x="1368" y="233" fill="#000">Intervenants</text><text x="1564" y="233">Mon compte</text><text x="1738" y="233">Déconnexion</text>
