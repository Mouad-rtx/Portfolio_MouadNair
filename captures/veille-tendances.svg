  <rect x="96" y="122" width="128" height="34" rx="17" fill="#eefdfb" stroke="#18b8a8"/>
  <text x="113" y="144" font-family="Arial" font-size="14" font-weight="700" fill="#122033">ANALYSE 2026</text>
  <text x="96" y="220" font-family="Arial" font-size="38" font-weight="800" fill="#122033">Tendances cybersécurité 2026</text>
  <text x="96" y="274" font-family="Arial" font-size="19" fill="#415066">Les tendances retenues correspondent aux menaces les plus observées.</text>
  <g font-family="Arial">
    <rect x="96" y="330" width="250" height="160" rx="6" fill="#fff" stroke="#d9e2ec"/>
    <text x="122" y="375" font-size="21" font-weight="800" fill="#122033">IA et cyberattaques</text>
    <text x="122" y="418" font-size="17" fill="#415066">L'IA accélère le phishing</text><text x="122" y="448" font-size="17" fill="#415066">et les contenus frauduleux.</text>
    <rect x="380" y="330" width="250" height="160" rx="6" fill="#fff" stroke="#d9e2ec"/>
    <text x="406" y="375" font-size="21" font-weight="800" fill="#122033">Phishing avancé</text>
    <text x="406" y="418" font-size="17" fill="#415066">Des messages plus crédibles</text><text x="406" y="448" font-size="17" fill="#415066">et personnalisés.</text>
    <rect x="664" y="330" width="250" height="160" rx="6" fill="#fff" stroke="#d9e2ec"/>
    <text x="690" y="375" font-size="21" font-weight="800" fill="#122033">Deepfake et fraude</text>
    <text x="690" y="418" font-size="17" fill="#415066">Usurpation d'identité</text><text x="690" y="448" font-size="17" fill="#415066">par voix et vidéo.</text>
    <rect x="948" y="330" width="250" height="160" rx="6" fill="#fff" stroke="#d9e2ec"/>
    <text x="974" y="375" font-size="21" font-weight="800" fill="#122033">Cyber-guerre</text>
    <text x="974" y="418" font-size="17" fill="#415066">Espionnage, sabotage</text><text x="974" y="448" font-size="17" fill="#415066">et attaques ciblées.</text>
