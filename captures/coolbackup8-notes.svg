<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 899 456" role="img"><rect width="899" height="456" fill="#262626"/><g font-family="Consolas,monospace" font-size="20" fill="#f5f5f5"><text x="20" y="28">Proposer aussi un paramétrage plus fin</text><rect x="289" y="56" width="535" height="48" fill="#7b7418"/><text x="20" y="73">Garder le fonctionnement du mail envoyé pour chaque sauvegarde</text><text x="20" y="96">(adresse email de l'administrateur)</text><text x="20" y="121">(option : prévoir la désactivation de ce mail...)</text><text x="20" y="188">Fait : Renommer partout : backupwordpress → coolbackup</text><rect x="113" y="216" width="757" height="196" fill="#262626" stroke="#fff"/><text x="118" y="247">Sous Linux :</text><text x="118" y="271">Afficher → grep -i backupwordpress *</text><text x="118" y="295">Changer → attention aux majuscules :</text><text x="118" y="319">find . -type f -exec sed -i 's/backupwordpress/coolbackup/g' {} +</text><text x="118" y="343">find . -type f -exec sed -i 's/BackUpWordPress/CoolBackup/g' {} +</text><text x="118" y="367">find . -type f -exec sed -i 's/BackupWordPress/CoolBackup/g' {} +</text><text x="118" y="391">find . -type f -exec sed -i 's/backupWPWordPress/CoolBackup/g' {} +</text></g></svg>
